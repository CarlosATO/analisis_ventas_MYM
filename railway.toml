[build]
builder = "nixpacks"

[phases.setup]
nixPkgs = ["nodejs_20", "python312"]

[phases.install]
cmds = [
    "cd mym_desktop/frontend && npm install",
    "pip install -r mym_desktop/backend/requirements.txt"
]

[phases.build]
cmds = [
    "cd mym_desktop/frontend && npm run build"
]

[deploy]
startCommand = "cd mym_desktop/backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
